---

# Service account the client will use to reset the deployment,
# by default the pods running inside the cluster can do no such things.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: test-rao-runner-deployment-restart
  namespace: gridcapa-test

---

# Allow getting status and patching only the one deployment you want to restart
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: test-rao-runner-deployment-restart
  namespace: gridcapa-test
rules:
  - apiGroups: ["apps", "extensions"]
    resources: ["deployments"]
#    resourceNames: ["rao-runner"] # This causes trouble when performing `kubectl get deployments` but maybe it will work better with `kubectl rollout restart deployment/rao-runner`
    verbs: ["get", "patch", "list", "watch"]

---

# Bind the role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: test-rao-runner-deployment-restart
  namespace: gridcapa-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: test-rao-runner-deployment-restart
subjects:
  - kind: ServiceAccount
    name: test-rao-runner-deployment-restart
    namespace: gridcapa-test

---

apiVersion: batch/v1
kind: CronJob
metadata:
  name: test-rao-runner-deployment-restart
  namespace: gridcapa-test
spec:
  concurrencyPolicy: Forbid
  # Don't forget that reference hour is the one of the cluster (UTC), which is two hours later than us (CEST): CEST 12h = UTC 10h
  schedule: '0 12 * * *' # Run at noon everyday
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: test-rao-runner-deployment-restart # name of the service account configured above
          restartPolicy: Never
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              imagePullPolicy: IfNotPresent
              command:
                - kubectl
                - get
                - deployments
                - '-l app=gridcapa,component=rao-runner'
                #- rollout
                #- restart
                #- 'deployment/rao-runner'
                # In case rollout can't be properly run, we can also try to run `kubectl delete pods -l app=gridcapa,component=rao-runner`
