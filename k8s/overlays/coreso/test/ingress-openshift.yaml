---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  annotations:
    haproxy.router.openshift.io/timeout: 5m
    app: gridcapa
    component: gridcapa
  labels:
    app: http-minio
  name: http-minio
spec:
  host: gridcapa-test.apps.s1049-ocp-u-ipi-001.rh.s1049.local/minio
  port:
    targetPort: https
  tls:
    insecureEdgeTerminationPolicy: Redirect
    termination: edge
  to:
    kind: Service
    name: gridcapa-minio
    weight: 100
  wildcardPolicy: None
---
  apiVersion: route.openshift.io/v1
