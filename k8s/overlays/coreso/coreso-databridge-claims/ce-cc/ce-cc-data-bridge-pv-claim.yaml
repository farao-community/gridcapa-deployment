apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ce-cc-data-bridge-storage
  labels:
    app: gridcapa
    component: data-bridge-storage
    region: ce
    process: cc
spec:
  storageClassName: thick-csi-pur-default
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 32M
