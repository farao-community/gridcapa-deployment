apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../bases/common
  - ../../../bases/cse-common
  - postgresql-deployment.yaml
  - postgresql-service.yaml
  - minio-get-storage-data-pv-claim.yaml

patches:
## highest priority
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: gateway
        labels:
          - accepts-neighbours: true 
      spec:
        template:
          spec:
            priorityClassName: gridcapa-highest-priority 
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: accepts-neighbours
                  operator: In
                  values:
                  - false
              topologyKey: topology.kubernetes.io/zone

  - patch: |-
