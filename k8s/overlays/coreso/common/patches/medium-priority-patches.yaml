patches:
  ## medium priority
  # common
  - patch: |-
      kind: Deployment
      apiVersion: apps/v1
      metadata:
        name: interruption-server
        labels:
          - accepts-neighbours: true 
      spec:
        template:
          spec:
            priorityClassName: gridcapa-medium-priority    
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: accepts-neighbours
                  operator: In
                  values:
                  - false
              topologyKey: topology.kubernetes.io/zone

  - patch: |-
      kind: Deployment
      apiVersion: apps/v1
