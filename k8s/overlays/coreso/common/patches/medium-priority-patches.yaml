                  - false
              topologyKey: topology.kubernetes.io/zone

  - patch: |-
      kind: Deployment
      apiVersion: apps/v1
      metadata:
        name: rao-runner
        labels:
          - accepts-neighbours: false 
      spec:
        template:
          spec:
            priorityClassName: gridcapa-medium-priority    
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: accepts-neighbours
                  operator: In
                  values:
                  - true
                  - false
              topologyKey: topology.kubernetes.io/zone
